<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>은퇴자산 현금흐름 시뮬레이터</title>
<style>
:root{
  --bg:#F6F3EC;
  --surface:#FFFFFF;
  --surface-2:#EFE9DA;
  --ink:#1C2B36;
  --ink-soft:#5B6B77;
  --ink-faint:#8B96A0;
  --accent:#A9762C;
  --accent-soft:#E9DCC0;
  --positive:#2F5D50;
  --positive-soft:#DCE8E3;
  --negative:#AE4A3C;
  --negative-soft:#F2DEDA;
  --warning:#fab219;
  --warning-soft:#FDF0D5;
  --neutral:#8B96A0;
  --neutral-soft:#E7E9EC;
  --line:#DCD5C4;
  --line-soft:#EAE5D8;
  --radius:2px;
  --serif:'Nanum Myeongjo','Noto Serif KR',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  --mono:'SF Mono','Consolas','Menlo',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
body{font-size:14px;line-height:1.5;}
h1,h2,h3{font-family:var(--serif);font-weight:600;margin:0;}
button{font-family:var(--sans);cursor:pointer;}
input,select{font-family:var(--sans);}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;}

/* ---------- Layout ---------- */
.app-header{
  padding:28px 32px 22px;
  border-bottom:1px solid var(--line);
  background:var(--surface);
}
.app-header .eyebrow{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.12em;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:6px;
}
.app-header h1{font-size:26px;color:var(--ink);}
.app-header p{margin:6px 0 0;color:var(--ink-soft);font-size:13px;max-width:640px;}
.privacy-note{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:12px;padding:6px 12px;
  border:1px solid var(--positive);border-radius:var(--radius);
  background:var(--positive-soft);color:var(--positive);
  font-size:11.5px;font-weight:600;max-width:640px;
}

.toolbar{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.toolbar button{
  border:1px solid var(--line);background:var(--surface);padding:8px 14px;
  font-size:12px;font-weight:600;color:var(--ink);border-radius:var(--radius);
}
.toolbar button:hover{background:var(--surface-2);border-color:var(--accent);}

/* 인쇄용 리포트 (평소엔 숨김, 인쇄시에만 노출) */
.report-view{display:none;}
@media print{
  body > header, body > .layout{display:none !important;}
  .report-view{display:block !important;}
  body{background:#fff;}
}
.report-view{padding:20px;font-family:var(--sans);color:#111;}
.report-view h1{font-size:20px;margin-bottom:4px;}
.report-view .rp-sub{font-size:12px;color:#555;margin-bottom:18px;}
.report-view table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px;}
.report-view th,.report-view td{border:1px solid #ccc;padding:5px 7px;text-align:right;}
.report-view th{background:#f0f0ea;text-align:center;}
.report-view td:first-child,.report-view th:first-child{text-align:left;}
.report-view .rp-section-title{font-size:13px;font-weight:700;margin:18px 0 8px;border-bottom:2px solid #333;padding-bottom:4px;}
.report-view .rp-assumptions{font-size:11px;line-height:1.7;color:#333;}
.report-view .rp-assumptions div{margin-bottom:2px;}
.report-view table.rp-settings td{text-align:left;}
.report-view table.rp-settings td:nth-child(1),.report-view table.rp-settings td:nth-child(3){color:#555;width:22%;}
.report-view table.rp-settings th{background:#e4e0d2;text-align:left;padding:6px 7px;}
.report-view table tr{page-break-inside:avoid;}
.report-view .rp-section-title{page-break-after:avoid;}
@media print{
  .report-view table{page-break-inside:auto;}
  .report-view thead, .report-view tr{page-break-inside:avoid;}
}

.layout{
  display:grid;
  grid-template-columns:340px 1fr;
  min-height:calc(100vh - 96px);
}
@media (max-width:900px){
  .layout{grid-template-columns:1fr;}
}

/* ---------- Sidebar ---------- */
.sidebar{
  background:var(--surface);
  border-right:1px solid var(--line);
  padding:18px 0 60px;
  overflow-y:auto;
}
.acc-section{border-bottom:1px solid var(--line-soft);}
.acc-head-row{
  display:flex;align-items:center;gap:8px;
  padding:14px 22px;
}
.acc-head{
  flex:1;
  display:flex;align-items:center;
  padding:0;
  background:none;border:none;
  text-align:left;
  font-size:13px;font-weight:700;
  color:var(--ink);
  letter-spacing:0.01em;
  cursor:pointer;
}
.acc-head .idx{
  font-family:var(--mono);color:var(--accent);margin-right:8px;font-weight:600;font-size:11px;
}
.acc-head .chev{color:var(--ink-faint);font-size:11px;transition:transform .15s ease;margin-left:8px;}
.acc-section.open .chev{transform:rotate(90deg);}
.sec-reset-btn{
  flex:none;font-size:10.5px;color:var(--ink-faint);
  background:none;border:1px solid var(--line);border-radius:var(--radius);
  padding:4px 8px;cursor:pointer;
}
.sec-reset-btn:hover{border-color:var(--accent);color:var(--accent);}
.acc-body{
  padding:0 22px 18px;
  display:none;
}
.acc-section.open .acc-body{display:block;}

.field{margin-bottom:12px;}
.field label{
  display:flex;justify-content:space-between;
  font-size:12px;color:var(--ink-soft);margin-bottom:5px;
}
.field label .val{font-family:var(--mono);color:var(--ink);font-weight:600;}
.field .field-note{font-size:11px;color:var(--ink-soft);margin:-2px 0 5px;}
.field input[type=range]{
  width:100%;accent-color:var(--accent);
}
.field input[type=number],.field input[type=date],.field select{
  width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--bg);font-size:13px;color:var(--ink);
}
.field.inline{display:flex;align-items:center;gap:8px;}
.field.inline label{margin:0;flex:1;}
.checkbox-row{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
  padding:8px 10px;background:var(--surface-2);border-radius:var(--radius);
}
.checkbox-row input{accent-color:var(--accent);}
.checkbox-row span{font-size:12px;color:var(--ink);font-weight:600;}
.subtle-note{font-size:11px;color:var(--ink-faint);margin-top:2px;line-height:1.4;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.info-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:14px;margin-left:5px;flex:none;
  border:1px solid var(--ink-faint);border-radius:50%;
  background:none;color:var(--ink-faint);
  font-size:10px;line-height:1;cursor:pointer;padding:0;
}
.info-icon:hover{border-color:var(--accent);color:var(--accent);}
.reset-icon{
  align-items:center;justify-content:center;
  width:14px;height:14px;margin-left:5px;flex:none;
  border:1px solid var(--accent);border-radius:50%;
  background:none;color:var(--accent);
  font-size:10px;line-height:1;cursor:pointer;padding:0;
}
.reset-icon:hover{background:var(--accent-soft);}
.info-popover{
  display:none;position:fixed;z-index:50;width:300px;max-width:calc(100vw - 24px);
  max-height:70vh;overflow-y:auto;
  background:var(--ink);color:#fff;
  padding:10px 12px;border-radius:2px;
  font-size:11.5px;line-height:1.55;
  box-shadow:0 4px 14px rgba(0,0,0,.22);
}
.info-popover-title{font-weight:700;color:var(--accent-soft);margin-bottom:4px;}
.info-popover-body{color:#EFE9DA;white-space:pre-line;}

/* ---------- Main ---------- */
.main{padding:26px 34px 60px;overflow-x:hidden;}

/* Timeline */
.timeline-wrap{margin-bottom:26px;}
.timeline-wrap h2{font-size:13px;color:var(--ink-soft);font-weight:700;margin-bottom:10px;letter-spacing:.02em;}
.timeline{
  position:relative;
  display:flex;
  height:56px;
  border:1px solid var(--line);
  background:var(--surface);
  overflow:hidden;
}
.tl-seg{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--line-soft);
  font-size:11px;color:var(--ink-soft);
  white-space:nowrap;overflow:hidden;
  transition:background .15s ease;
}
.tl-seg:last-child{border-right:none;}
.tl-seg b{color:var(--ink);font-weight:700;margin-right:4px;}
.tl-seg.phase-work{background:var(--accent-soft);}
.tl-seg.phase-voluntary{background:#E4ECE8;}
.tl-seg.phase-region{background:var(--surface);}
.tl-seg.phase-downsize{background:var(--negative-soft);}
.tl-seg.phase-nps{background:var(--positive-soft);}

/* KPI cards */
.kpi-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:28px;
}
@media (max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi{
  background:var(--surface);border:1px solid var(--line);padding:16px 18px;
}
.kpi .label{font-size:11px;color:var(--ink-soft);letter-spacing:.02em;margin-bottom:8px;}
.kpi .value{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink);}
.kpi .value small{font-size:12px;font-weight:500;color:var(--ink-faint);}
.kpi .sub{font-size:11px;color:var(--ink-faint);margin-top:4px;}
.kpi.kpi-alert{border-color:var(--negative);background:var(--negative-soft);}
.kpi.kpi-alert .value{color:var(--negative);}

/* Chart */
.chart-card{
  background:var(--surface);border:1px solid var(--line);padding:20px 22px 12px;margin-bottom:28px;
}
.chart-card h2{font-size:13px;color:var(--ink-soft);font-weight:700;margin-bottom:4px;letter-spacing:.02em;}
.chart-legend{display:flex;gap:16px;font-size:11px;color:var(--ink-soft);margin-bottom:8px;}
.chart-legend span{display:inline-flex;align-items:center;gap:5px;}
.chart-legend i{width:10px;height:10px;display:inline-block;border-radius:1px;}
canvas{width:100%;display:block;}
.chart-wrap{position:relative;}
.chart-tooltip{
  position:absolute;pointer-events:none;
  background:var(--ink);color:#fff;font-family:var(--mono);font-size:11px;
  padding:8px 10px;border-radius:2px;white-space:normal;max-width:250px;
  transform:translate(-50%,-110%);
  opacity:0;transition:opacity .08s ease;
  z-index:5;line-height:1.5;
}
.chart-tooltip.show{opacity:1;}
.chart-tooltip .tt-title{font-weight:700;color:var(--accent-soft);margin-bottom:2px;}
.chart-tooltip .tt-sub{color:#B9C2C9;font-size:10px;}
.chart-tooltip .tt-alert{
  color:#F5C860;margin-top:5px;padding-top:5px;
  border-top:1px solid rgba(255,255,255,.18);font-size:10.5px;line-height:1.5;
}
.chart-crosshair{
  position:absolute;top:0;bottom:0;width:1px;background:var(--ink-faint);
  opacity:0;pointer-events:none;
}
.chart-crosshair.show{opacity:.5;}

/* Monthly table */
.table-card{
  background:var(--surface);border:1px solid var(--line);
}
.table-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 22px;border-bottom:1px solid var(--line);
}
.table-head h2{font-size:13px;color:var(--ink-soft);font-weight:700;letter-spacing:.02em;}
.year-nav{display:flex;align-items:center;gap:10px;}
.year-nav button{
  border:1px solid var(--line);background:var(--surface);width:28px;height:28px;
  color:var(--ink);font-size:14px;
}
.year-nav button:hover{background:var(--surface-2);}
.year-nav select{
  border:1px solid var(--line);padding:6px 10px;background:var(--bg);font-size:13px;font-weight:700;
  font-family:var(--mono);color:var(--ink);
}
.table-scroll{overflow-x:auto;}
table.monthly{width:100%;border-collapse:collapse;font-size:12px;min-width:920px;}
table.monthly th, table.monthly td{
  padding:8px 10px;text-align:right;border-bottom:1px solid var(--line-soft);white-space:nowrap;
}
table.monthly th:first-child, table.monthly td:first-child{text-align:left;position:sticky;left:0;background:var(--surface);}
table.monthly thead th{
  background:var(--surface-2);color:var(--ink-soft);font-weight:700;font-size:11px;
  position:sticky;top:0;z-index:2;
}
table.monthly thead th:first-child{z-index:3;}
table.monthly tbody tr:hover td{background:#FBF9F4;}
table.monthly td.num{font-family:var(--mono);}
table.monthly td.neg{color:var(--negative);}
table.monthly td.pos-strong{color:var(--positive);font-weight:700;}
table.monthly tfoot td{
  font-weight:700;border-top:2px solid var(--ink);border-bottom:none;background:var(--surface-2);
}
.badge{
  display:inline-block;font-size:10px;padding:2px 6px;border-radius:2px;
  background:var(--accent-soft);color:var(--accent);font-weight:700;margin-left:6px;
}
.badge.region{background:var(--surface-2);color:var(--ink-soft);}
.badge.voluntary{background:#E4ECE8;color:var(--positive);}
.badge.work{background:var(--accent-soft);color:var(--accent);}

.footnote{
  font-size:11px;color:var(--ink-faint);line-height:1.6;margin-top:22px;padding-top:16px;border-top:1px solid var(--line);
}

.target-banner{
  display:flex;align-items:center;gap:8px;
  padding:10px 22px;font-size:12px;border-bottom:1px solid var(--line);
}
.target-banner.short{background:var(--negative-soft);color:#7A3226;}
.target-banner.ok{background:var(--positive-soft);color:#1E4038;}

</style>
</head>
<body>

<header class="app-header">
  <div class="eyebrow">RETIREMENT CASH FLOW LEDGER</div>
  <h1>은퇴자산 현금흐름 시뮬레이터</h1>
  <p>퇴직연금·개인연금·국민연금·재취업·실업급여·건강보험·주택 다운사이징까지 반영한 월별 현금흐름 추정 도구입니다. 좌측 변수를 조정하면 즉시 재계산됩니다.</p>
  <p class="privacy-note">모든 계산은 이 브라우저 안에서만 처리됩니다. 입력하신 정보는 외부 서버로 전송되거나 저장되지 않습니다.</p>
  <div class="toolbar">
    <button id="btnSave">설정 저장</button>
    <button id="btnLoad">설정 불러오기</button>
    <input type="file" id="fileLoad" accept="application/json" style="display:none;">
    <button id="btnExcel">엑셀 다운로드</button>
    <button id="btnReport">리포트 인쇄</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="timeline-wrap">
      <h2>생애주기 타임라인</h2>
      <div class="timeline" id="timeline"></div>
    </div>

    <div class="kpi-row" id="kpiRow"></div>

    <div class="chart-card">
      <h2>월별 수입·지출·순현금흐름 추이 (전체 기간)</h2>
      <div class="chart-legend">
        <span><i style="background:#2FA88A"></i>총수입</span>
        <span><i style="background:#D9853F"></i>총세금·공과금</span>
        <span><i style="background:#3D7AB8"></i>세후 순현금흐름</span>
        <span><i style="background:var(--neutral-soft);border:1px solid var(--neutral);"></i>한도초과 과세 연도</span>
      </div>
      <div class="chart-wrap">
        <canvas id="annualChart" height="280"></canvas>
        <div class="chart-crosshair" id="chartCrosshair"></div>
        <div class="chart-tooltip" id="chartTooltip"></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-head">
        <h2 id="monthlyTitle">월별 현금흐름</h2>
        <div class="year-nav">
          <button id="prevYear">‹</button>
          <select id="yearSelect"></select>
          <button id="nextYear">›</button>
        </div>
      </div>
      <div class="target-banner" id="pensionLimitBanner" style="display:none;"></div>
      <div class="table-scroll">
        <table class="monthly" id="monthlyTable"></table>
      </div>
    </div>

    <div class="footnote" id="footnote"></div>
  </main>
</div>

<div class="report-view" id="reportView"></div>
<div class="info-popover" id="infoPopover"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ============================================================
// 은퇴자산 현금흐름 시뮬레이터 - 계산 엔진
// 모든 금액 단위: 만원 (10,000 KRW)
// ============================================================

function pensionIncomeDeduction(x) {
  if (x <= 350) return x;
  if (x <= 700) return 350 + (x - 350) * 0.4;
  if (x <= 1400) return 490 + (x - 700) * 0.2;
  return Math.min(900, 630 + (x - 1400) * 0.1); // 근거: 소득세법 제47조의2 — 연금소득공제 한도 900만원
}

function earnedIncomeDeduction(x) {
  if (x <= 0) return 0;
  if (x <= 500) return x * 0.7;
  if (x <= 1500) return 350 + (x - 500) * 0.4;
  if (x <= 4500) return 950 + (x - 1500) * 0.15;
  if (x <= 10000) return 1425 + (x - 4500) * 0.05;
  return 1725 + (x - 10000) * 0.02;
}

function globalTax(base) {
  if (base <= 0) return 0;
  if (base <= 1400) return base * 0.06;
  if (base <= 5000) return base * 0.15 - 126;
  if (base <= 8800) return base * 0.24 - 576;
  if (base <= 15000) return base * 0.35 - 1544;
  if (base <= 30000) return base * 0.38 - 1994;
  if (base <= 50000) return base * 0.40 - 2594;
  if (base <= 100000) return base * 0.42 - 3594;
  return base * 0.45 - 6594; // 근거: 소득세법 제55조 — 과세표준 10억원 초과 구간(45%, 누진공제 6,594만원)
}

function propertyTaxCalc(gongsiga, fairRatio) {
  const base = gongsiga * fairRatio;
  let prop;
  if (base <= 6000) prop = base * 0.001;
  else if (base <= 15000) prop = 6 + (base - 6000) * 0.0015;
  else if (base <= 30000) prop = 19.5 + (base - 15000) * 0.0025;
  else prop = 63 + (base - 30000) * 0.004;
  const city = base * 0.0014;
  const edu = prop * 0.2;
  return { prop, city, edu, total: prop + city + edu };
}

// 근거: 소득세법 시행령 [별표3] 근속연수공제
function serviceDeduction(years) {
  if (years <= 5) return years * 100;
  if (years <= 10) return 500 + (years - 5) * 200;
  if (years <= 20) return 1500 + (years - 10) * 250;
  return 4000 + (years - 20) * 300;
}

// ------------------------------------------------------------
// 국민연금 노령연금 정상수령(지급개시) 연령 — 출생연도별 단계적 상향
// 근거: 국민연금법 부칙(법률 제15267호) 제8조 — 1953년생부터 5년 단위로 1세씩 상향, 2033년 65세로 완성
// ------------------------------------------------------------
function npsNormalAge(birthYear) {
  if (birthYear <= 1952) return 60;
  if (birthYear <= 1956) return 61;
  if (birthYear <= 1960) return 62;
  if (birthYear <= 1964) return 63;
  if (birthYear <= 1968) return 64;
  return 65;
}

// ------------------------------------------------------------
// 건강보험 지역가입자 재산보험료 부과점수표 (국민건강보험법 시행령 별표4, 1~14등급 확인된 구간)
// x: 재산보험료 부과표준(만원) = 재산세 과세표준 - 기본공제(1억원, 2024.2월 개정)
// 14등급(6,930만원) 초과 구간은 보건복지부 공식 예시(재산과표 1.1억원=11,000만원 -> 465점, 19등급)로
// 보정한 로그 근사 곡선을 사용합니다 (고액 구간일수록 실제 등급표와 다소 오차가 있을 수 있음)
// ------------------------------------------------------------
const PROPERTY_SCORE_TABLE = [
  [450, 22], [900, 44], [1350, 66], [1800, 97], [2250, 122], [2700, 146],
  [3150, 171], [3600, 195], [4050, 219], [4500, 244], [5020, 268], [5590, 294],
  [6220, 320], [6930, 344]
];
function propertyScore(x) {
  if (x <= 0) return 0;
  for (const [upper, score] of PROPERTY_SCORE_TABLE) {
    if (x <= upper) return score;
  }
  // 고액구간 로그 근사 (앵커: 6,930만원=344점 실측, 11,000만원=465점 정부예시)
  const b = (465 - 344) / (Math.log(11000) - Math.log(6930));
  const a = 344 - b * Math.log(6930);
  return a + b * Math.log(x);
}
// 월 재산보험료(만원) 자동계산: 공시가격 -> 재산세 과세표준 -> 기본공제 -> 점수 -> 점수당금액
function propertyInsurancePremium(gongsiga, fairRatio) {
  const propTaxBase = gongsiga * fairRatio;
  const nhisBase = Math.max(0, propTaxBase - 10000); // 기본공제 1억원 (2024.2월 개정, 주택부채공제는 별도 미반영)
  const POINT_VALUE_WON = 211.5; // 2026년 기준 점수당 금액(원)
  const score = propertyScore(nhisBase);
  return score * POINT_VALUE_WON / 10000; // 만원 단위로 환산
}

function retirementEffectiveRate(principal, years, pensionYearsOver10) {
  if (!years || years <= 0 || !principal || principal <= 0) return { full: 0, reduced: 0 };
  const svcDed = serviceDeduction(years);
  const hwansan = Math.max(0, (principal - svcDed)) * 12 / years;
  // 근거: 소득세법 시행령 제42조의3(환산급여공제)
  let hwansanDed;
  if (hwansan <= 800) hwansanDed = hwansan;
  else if (hwansan <= 7000) hwansanDed = 800 + (hwansan - 800) * 0.6;
  else if (hwansan <= 10000) hwansanDed = 4520 + (hwansan - 7000) * 0.55;
  else if (hwansan <= 30000) hwansanDed = 6170 + (hwansan - 10000) * 0.45;
  else hwansanDed = 15170 + (hwansan - 30000) * 0.35;
  const taxBase = Math.max(0, hwansan - hwansanDed);
  const hwansanTax = globalTax(taxBase);
  const finalTax = hwansanTax * years / 12;
  const fullRate = principal > 0 ? finalTax / principal : 0;
  const reduction = pensionYearsOver10 ? 0.6 : 0.7; // 실제 납부비율(=100%-감면율). 수령연차 10년 이하 70%납부(30%감면), 10년초과 60%납부(40%감면)
  return { full: fullRate, reduced: fullRate * reduction };
}

// ------------------------------------------------------------
// 연금수령한도 = 연금계좌 평가액(연초) / (11 - 연금수령연차) x 120%
// 연금수령연차 11년차 이상은 한도 없음(무제한)
// ------------------------------------------------------------
function pensionWithdrawalLimit(balanceAtYearStart, pensionYear) {
  if (pensionYear <= 0) return 0; // 아직 개시 전
  if (pensionYear >= 11) return Infinity;
  const denom = 11 - pensionYear;
  return (balanceAtYearStart / denom) * 1.2;
}

function midx(year, month) { return year * 12 + (month - 1); }

function referenceEndIdx(params) {
  if (params.workEnabled) return midx(params.workEndYear, params.workEndMonth);
  return midx(params.baseYear, 12);
}

function isEmployedMonth(year, month, params) {
  if (!params.workEnabled) return false;
  const idx = midx(year, month);
  const s = midx(params.workStartYear, params.workStartMonth);
  const e = midx(params.workEndYear, params.workEndMonth);
  return idx >= s && idx <= e;
}

function employmentDurationMonths(params) {
  if (!params.workEnabled) return 0;
  const s = midx(params.workStartYear, params.workStartMonth);
  const e = midx(params.workEndYear, params.workEndMonth);
  return Math.max(0, e - s + 1);
}

// 임의계속가입 자격: 재취업 기간이 1년(12개월) 이상이었던 경우에만 자동 적용 (수동 on/off 없음, 실제 제도 요건 반영)
function isVoluntaryMonth(year, month, params) {
  if (!params.workEnabled) return false;
  if (employmentDurationMonths(params) < 12) return false;
  const idx = midx(year, month);
  const endIdx = referenceEndIdx(params);
  const voluntaryEndIdx = endIdx + params.voluntaryMaxYears * 12;
  return idx > endIdx && idx <= voluntaryEndIdx;
}

function isUnemploymentMonth(year, month, params) {
  if (!params.unempEnabled) return false;
  const idx = midx(year, month);
  const endIdx = referenceEndIdx(params);
  return idx > endIdx && idx <= endIdx + params.unempMonths;
}

// ------------------------------------------------------------
// 연금계좌 잔고 12개월 인출 시뮬레이션
// balanceStart: 해당연도 1월 시작 시점 잔고
// monthlyTargets: 12개월 각각의 인출 희망액 배열(개시 전 월은 0)
// annualReturnRate: 연 운용수익률(%)
// 매월: 잔고에 월복리 수익 적용 -> 인출(잔고 한도 내) -> 잔고 차감
// ------------------------------------------------------------
function walkAccount(balanceStart, monthlyTargets, annualReturnRate) {
  const monthlyReturn = Math.pow(1 + (annualReturnRate || 0) / 100, 1 / 12) - 1;
  let balance = Math.max(0, balanceStart);
  const monthlyActual = [];
  let depletedMonth = null; // 0~11, 그 달에 목표액을 다 못 채웠으면 기록
  for (let m = 0; m < 12; m++) {
    const target = monthlyTargets[m];
    const actual = Math.min(target, Math.max(0, balance));
    balance -= actual;                 // 1) 먼저 인출
    balance *= (1 + monthlyReturn);    // 2) 인출 후 남은 잔액에만 그 달 수익률 적용
    monthlyActual.push(actual);
    if (depletedMonth === null && target > 0 && actual < target - 1e-6) depletedMonth = m;
  }
  return {
    monthlyActual,
    balanceEnd: Math.max(0, balance),
    annualActual: monthlyActual.reduce((a, b) => a + b, 0),
    depletedMonth
  };
}

// 특정 연도의 12개월 중 개시일(startYear/startMonth) 이후부터 amount, 이전은 0
function buildStartGatedTargets(year, startYear, startMonth, amount) {
  const startIdx = midx(startYear || year, startMonth || 1);
  const arr = [];
  for (let m = 1; m <= 12; m++) arr.push(midx(year, m) >= startIdx ? amount : 0);
  return arr;
}

// ------------------------------------------------------------
// 계좌 내 재원(tier)별 인출 배분 (소득세법 시행령 제40조의3 인출순서)
// tierStarts: 인출 우선순위 순서(앞부터 먼저 소진)의 연초 잔고 배열
// walk: walkAccount()로 계산된 총액 기준 결과(annualActual, balanceEnd) — 인출 가능액 자체는 그대로 사용
// limit: 해당 연도 연금수령한도(Infinity 가능)
// limitedFromIndex: 이 인덱스 이상인 tier부터 한도 적용대상(그 이전 tier는 비과세·한도무관, 예: 세액공제 안 받은 원금)
// 운용손익은 인출 역순(마지막 tier부터)으로 흡수 — 손실도 마지막 tier가 먼저 부담
// ------------------------------------------------------------
function allocateTiers(tierStarts, walk, limit, limitedFromIndex) {
  const totalStart = tierStarts.reduce((a, b) => a + b, 0);
  const annualActual = walk.annualActual;

  let remaining = annualActual;
  const withdrawn = tierStarts.map(() => 0);
  for (let i = 0; i < tierStarts.length; i++) {
    const take = Math.min(remaining, tierStarts[i]);
    withdrawn[i] = take;
    remaining -= take;
    if (remaining <= 1e-9) break;
  }

  const totalReturn = walk.balanceEnd - (totalStart - annualActual);
  const tierEnds = tierStarts.map((s, i) => s - withdrawn[i]);
  let retLeft = totalReturn;
  for (let i = tierEnds.length - 1; i >= 0 && retLeft !== 0; i--) {
    const newVal = tierEnds[i] + retLeft;
    if (newVal < 0) { retLeft = newVal; tierEnds[i] = 0; }
    else { tierEnds[i] = newVal; retLeft = 0; }
  }

  let limitLeft = limit;
  const within = tierStarts.map(() => 0);
  const excess = tierStarts.map(() => 0);
  tierStarts.forEach((_, i) => {
    if (i < limitedFromIndex) { within[i] = withdrawn[i]; return; }
    const w = Math.min(withdrawn[i], Math.max(0, limitLeft));
    within[i] = w;
    excess[i] = withdrawn[i] - w;
    limitLeft -= w;
  });

  return { withdrawn, tierEnds, within, excess };
}

// ------------------------------------------------------------
// 연도 단위 계산
// dcPrincipalStart/dcGainStart, personalNonDeductibleStart/personalTaxableStart:
// 해당 연도 1월 시작 시점 재원별(tier) 잔고 (연도간 이어짐)
// ------------------------------------------------------------
function calcYear(year, params, dcPrincipalStart, dcGainStart, personalNonDeductibleStart, personalTaxableStart) {
  const age = year - params.birthYear;
  const infl = params.inflation / 100;

  // ---- DC퇴직연금 잔고 인출 시뮬레이션 (개시 연/월 반영) ----
  const dcTargets = buildStartGatedTargets(year, params.dcStartYear, params.dcStartMonth, params.dcMonthly);
  const dcBalanceStart = dcPrincipalStart + dcGainStart;
  const dcWalk = walkAccount(dcBalanceStart, dcTargets, params.dcReturnRate);
  const dcAnnual = dcWalk.annualActual;

  // 연금수령한도 (DC퇴직연금): 한도 = 연초잔고/(11-연금수령연차) x 120%
  const dcPensionYear = (year >= params.dcStartYear) ? (year - params.dcStartYear + 1) : 0;
  const dcLimit = pensionWithdrawalLimit(dcBalanceStart, dcPensionYear);

  // 인출순서: 이연퇴직소득(원금) 먼저 소진 -> 운용수익 나중 (비례배분 아님, 소득세법 시행령 제40조의3)
  const dcAlloc = allocateTiers([dcPrincipalStart, dcGainStart], dcWalk, dcLimit, 0);
  const dcPrincipalBalanceEnd = dcAlloc.tierEnds[0];
  const dcGainBalanceEnd = dcAlloc.tierEnds[1];
  const dcExcess = dcAlloc.excess[0] + dcAlloc.excess[1];
  const principalPart = dcAlloc.within[0];      // 한도이내 원금: 이연퇴직소득세 감면세율 적용대상
  const gainPart = dcAlloc.within[1];           // 한도이내 운용수익: 연금소득세(종합/분리) 대상
  const dcExcessPrincipal = dcAlloc.excess[0];  // 한도초과 원금: 감면 없는 전체 퇴직소득세율
  const dcExcessGain = dcAlloc.excess[1];       // 한도초과 운용수익: 16.5% 기타소득세

  // ---- 개인연금 잔고 인출 시뮬레이션 (개시 연/월 + 목표충당 추가인출 반영) ----
  const personalMonthlyTarget = params.personalMonthly;
  const personalTargets = buildStartGatedTargets(year, params.personalStartYear, params.personalStartMonth, personalMonthlyTarget);
  const personalBalanceStart = personalNonDeductibleStart + personalTaxableStart;
  const personalWalk = walkAccount(personalBalanceStart, personalTargets, params.personalReturnRate);
  const personalAnnual = personalWalk.annualActual;

  // 연금수령한도 (개인연금저축)
  const personalPensionYear = (year >= params.personalStartYear) ? (year - params.personalStartYear + 1) : 0;
  const personalLimit = pensionWithdrawalLimit(personalBalanceStart, personalPensionYear);

  // 인출순서: 세액공제 받지 않은 원금(비과세, 한도 미적용) 먼저 -> 세액공제받은 원금+운용수익(한도 적용) 나중
  const personalAlloc = allocateTiers([personalNonDeductibleStart, personalTaxableStart], personalWalk, personalLimit, 1);
  const personalNonDeductibleBalanceEnd = personalAlloc.tierEnds[0];
  const personalTaxableBalanceEnd = personalAlloc.tierEnds[1];
  const personalExcess = personalAlloc.excess[1];       // 비과세 tier(index 0)는 한도 미적용이라 항상 excess 0
  const personalWithinLimit = personalAlloc.within[1];  // 한도이내분만 정상 연금소득세/종합과세 판단 대상

  // ---- 국민연금 (조기수령 -5~0 / 연기수령 0~+5, 출생연도별 정상수령연령 기준) ----
  let npsMonthlyFull = 0;
  const npsAdjustYears = params.npsAdjustYears || 0;
  const npsNormAge = npsNormalAge(params.birthYear);
  const npsStartAge = npsNormAge + npsAdjustYears;
  if (params.npsEnabled && age >= npsStartAge) {
    const yrsSinceStart = age - npsStartAge;
    const adjustFactor = npsAdjustYears >= 0
      ? 1 + 0.072 * npsAdjustYears   // 연기수령: 연 7.2% 가산
      : 1 - 0.06 * Math.abs(npsAdjustYears); // 조기수령: 연 6% 감액
    const npsBase = params.npsNormal63 * Math.max(0, adjustFactor);
    npsMonthlyFull = npsBase * Math.pow(1 + infl, yrsSinceStart);
  }
  // 조기노령연금 지급정지: 정상수령나이 도달 전(조기수령 중)에 소득 있는 업무(재취업)에 종사하는 달은 국민연금 전액 지급정지
  // 근거: 국민연금법 제63조 — 정상수령나이 이후의 소득활동에 따른 감액(제63조의2, 최대 50%)은 별도이며 미반영
  const npsEarlySuspendApplies = npsAdjustYears < 0 && age < npsNormAge;

  const monthlyWage = params.workEnabled ? params.workSalary / 12 : 0;
  let earnedAnnual = 0, unemploymentAnnual = 0, npsAnnual = 0;
  const monthStatus = [];
  const monthEarned = [];
  const monthUnemp = [];
  const monthNps = [];
  for (let m = 1; m <= 12; m++) {
    const employed = isEmployedMonth(year, m, params);
    const voluntary = isVoluntaryMonth(year, m, params);
    const unemp = isUnemploymentMonth(year, m, params);
    const e = employed ? params.workSalary / 12 : 0;
    const u = unemp ? params.unempMonthly : 0;
    const n = (npsEarlySuspendApplies && employed) ? 0 : npsMonthlyFull;
    monthEarned.push(e);
    monthUnemp.push(u);
    monthNps.push(n);
    monthStatus.push(employed ? 'work' : (voluntary ? 'voluntary' : 'region'));
    earnedAnnual += e;
    unemploymentAnnual += u;
    npsAnnual += n;
  }
  const isWorking = earnedAnnual > 0;

  const effRateObj = retirementEffectiveRate(params.dcPrincipal, params.serviceYears, dcPensionYear > 10);
  const taxRetire = principalPart * effRateObj.reduced + dcExcessPrincipal * effRateObj.full;
  const taxRetireLocal = taxRetire * 0.1;

  // 연금수령한도 초과분(운용수익분+개인연금분) - 16.5% 기타소득세(분리과세, 종합/분리 선택대상 아님)
  const excessOtherBase = dcExcessGain + personalExcess;
  const excessOtherTax = excessOtherBase * 0.165;
  const excessOtherTaxLocal = excessOtherTax * 0.1;

  // 한도이내 사적연금(퇴직연금 운용수익+개인연금, 국민연금 등 공적연금 제외)만 1500만원 판정·분리과세 선택 대상
  const privatePensionTotal = gainPart + personalWithinLimit;
  const privateTotal = privatePensionTotal + npsAnnual; // 종합과세 전액 선택 시에는 공적+사적 합산
  const ded = pensionIncomeDeduction(privateTotal);
  const pensionIncome = Math.max(0, privateTotal - ded);

  const earnedDed = earnedIncomeDeduction(earnedAnnual);
  const earnedIncome = Math.max(0, earnedAnnual - earnedDed);

  const combinedBase = Math.max(0, pensionIncome + earnedIncome - 150 * params.dependents);
  const taxGlobalAll = globalTax(combinedBase);

  // 사적연금 분리과세 대안세율: 1500만원 이하 확정기간형 기준 연령별 저율(55~69세 5.5%, 70~79세 4.4%, 80세이상 3.3%),
  // 1500만원 초과분은 16.5%(2023년 개정, 지방세 포함)
  const sepRate = privatePensionTotal <= 1500
    ? (age >= 80 ? 0.033 : age >= 70 ? 0.044 : 0.055)
    : 0.165;
  const sepTax = privatePensionTotal * sepRate;

  // 분리과세 선택 시에도 국민연금(공적연금)은 항상 종합과세 대상이라 근로소득과 합산
  const npsDed = pensionIncomeDeduction(npsAnnual);
  const npsIncome = Math.max(0, npsAnnual - npsDed);
  const altGlobalBase = Math.max(0, npsIncome + earnedIncome - 150 * params.dependents);
  const taxAlt = globalTax(altGlobalBase) + sepTax;

  const chosenGlobal = taxGlobalAll <= taxAlt;
  const taxIncomeFinal = chosenGlobal ? taxGlobalAll : taxAlt;
  const taxIncomeLocal = taxIncomeFinal * 0.1;
  const totalIncomeTax = taxRetire + taxRetireLocal + taxIncomeFinal + taxIncomeLocal + excessOtherTax + excessOtherTaxLocal;

  let gongsiga;
  if (params.downsizeEnabled && year >= params.downsizeYear) {
    gongsiga = params.downsizeTargetGongsiga * Math.pow(1 + infl, year - params.downsizeYear);
  } else {
    gongsiga = params.gongsigaStart * Math.pow(1 + infl, year - params.baseYear);
  }

  // 건강보험료 지역가입자 소득보험료: 부과대상 연금소득은 공적연금(국민연금)만 해당하고 사적연금(DC운용수익·개인연금)은 제외되며,
  // 소득세 종합/분리과세 선택과 무관하게 항상 반영됨. 연금소득공제 적용 전 총액 기준, 2024.9월 개편으로 반영비율 50%
  // 근거: 국민건강보험법 시행령 제41조 [별표3]
  const nhisPensionBase = npsAnnual * 0.5;
  const incomeForNhis = Math.max(0, nhisPensionBase - 336);
  const monthlyIncomePremium = incomeForNhis / 12 * 0.0719; // 2026년 건강보험료율 7.19%
  const approxPropertyPremium = propertyInsurancePremium(gongsiga, 0.45);
  const regionMonthTotal = (monthlyIncomePremium + approxPropertyPremium) * 1.1314; // 장기요양 13.14%
  const workMonthTotal = (monthlyWage * 0.03595) * 1.1314; // 직장가입자 본인부담 3.595%(=7.19%/2)

  const monthNhis = monthStatus.map(s => (s === 'work' || s === 'voluntary') ? workMonthTotal : regionMonthTotal);
  const nhisAnnual = monthNhis.reduce((a, b) => a + b, 0);

  const counts = { work: 0, voluntary: 0, region: 0 };
  monthStatus.forEach(s => counts[s]++);
  const nhisType = { work: '직장', voluntary: '임의계속', region: '지역' }[
    Object.keys(counts).reduce((a, b) => counts[a] >= counts[b] ? a : b)
  ];

  const propTax = propertyTaxCalc(gongsiga, 0.45);
  const jongbuThreshold = 120000; // 12억원 — 2023.1.1 이후 1세대1주택자 종부세 기본공제(구법 11억원에서 상향)
  const jongbu = gongsiga <= jongbuThreshold ? 0 : (gongsiga - jongbuThreshold) * 0.6 * 0.006; // 종부세 공정시장가액비율 60%(재산세 1주택 특례 45%와는 별개 값)

  const isSaleYear = params.downsizeEnabled && year === params.downsizeYear; // 참고용 플래그(현금흐름에는 미반영)

  const totalTaxAll = totalIncomeTax + nhisAnnual + propTax.total + jongbu;
  const grossIncome = dcAnnual + personalAnnual + npsAnnual + earnedAnnual + unemploymentAnnual;
  const netIncome = grossIncome - totalTaxAll;

  return {
    year, age,
    dcAnnual, personalAnnual, npsAnnual, earned: earnedAnnual, unemployment: unemploymentAnnual,
    principalPart, gainPart,
    taxRetire: taxRetire + taxRetireLocal,
    taxIncome: taxIncomeFinal + taxIncomeLocal,
    excessOtherTax: excessOtherTax + excessOtherTaxLocal,
    dcLimit, dcExcess, personalLimit, personalExcess, dcPensionYear, personalPensionYear,
    chosenGlobal,
    nhisAnnual, nhisType,
    propTax: propTax.total, jongbu,
    gongsiga,
    isWorking, isVoluntary: nhisType === '임의계속', isSaleYear,
    totalTaxAll, grossIncome, netIncome,
    dcPrincipalBalanceEnd, dcGainBalanceEnd, personalNonDeductibleBalanceEnd, personalTaxableBalanceEnd,
    dcBalanceEnd: dcPrincipalBalanceEnd + dcGainBalanceEnd,
    personalBalanceEnd: personalNonDeductibleBalanceEnd + personalTaxableBalanceEnd,
    dcDepletedMonth: dcWalk.depletedMonth, personalDepletedMonth: personalWalk.depletedMonth,
    _monthStatus: monthStatus, _monthEarned: monthEarned, _monthUnemp: monthUnemp, _monthNhis: monthNhis,
    _monthDc: dcWalk.monthlyActual, _monthPersonal: personalWalk.monthlyActual, _monthNps: monthNps
  };
}

// 전체 기간 연도별 시뮬레이션 (재원별 잔고를 연도 간 이어서 추적)
function runSimulation(params) {
  const results = [];
  let dcPrincipalBalance = Math.max(0, params.dcPrincipal || 0);
  let dcGainBalance = Math.max(0, params.dcGain || 0);
  const personalTotalStart = Math.max(0, params.personalBalance || 0);
  let personalNonDeductibleBalance = Math.min(Math.max(0, params.personalNonDeductiblePrincipal || 0), personalTotalStart);
  let personalTaxableBalance = personalTotalStart - personalNonDeductibleBalance;
  let dcDepletedAt = null, personalDepletedAt = null;

  for (let year = params.startYear; year <= params.endYear; year++) {
    const r = calcYear(year, params, dcPrincipalBalance, dcGainBalance, personalNonDeductibleBalance, personalTaxableBalance);

    if (dcDepletedAt === null && r.dcDepletedMonth !== null) dcDepletedAt = { year, month: r.dcDepletedMonth + 1 };
    if (personalDepletedAt === null && r.personalDepletedMonth !== null) personalDepletedAt = { year, month: r.personalDepletedMonth + 1 };

    dcPrincipalBalance = r.dcPrincipalBalanceEnd;
    dcGainBalance = r.dcGainBalanceEnd;
    personalNonDeductibleBalance = r.personalNonDeductibleBalanceEnd;
    personalTaxableBalance = r.personalTaxableBalanceEnd;
    results.push(r);
  }
  results.dcDepletedAt = dcDepletedAt;
  results.personalDepletedAt = personalDepletedAt;
  return results;
}

function buildMonthly(yearResult, params) {
  const months = [];
  for (let m = 1; m <= 12; m++) {
    months.push({
      month: m,
      dc: yearResult._monthDc[m - 1],
      personal: yearResult._monthPersonal[m - 1],
      nps: yearResult._monthNps[m - 1],
      earned: yearResult._monthEarned[m - 1],
      unemployment: yearResult._monthUnemp[m - 1],
      taxRetire: yearResult.taxRetire / 12,
      taxIncome: yearResult.taxIncome / 12,
      nhis: yearResult._monthNhis[m - 1],
      nhisStatus: yearResult._monthStatus[m - 1],
      propTax: 0,
      jongbu: 0
    });
  }
  if (yearResult.propTax > 0) {
    months[6].propTax = yearResult.propTax * 0.5;
    months[8].propTax = yearResult.propTax * 0.5;
  }
  if (yearResult.jongbu > 0) months[11].jongbu = yearResult.jongbu;
  return months.map(r => {
    const income = r.dc + r.personal + r.nps + r.earned + r.unemployment;
    const expense = r.taxRetire + r.taxIncome + r.nhis + r.propTax + r.jongbu;
    return Object.assign(r, { income, expense, net: income - expense });
  });
}

function buildFullMonthlySeries(results, params) {
  const series = [];
  results.forEach(r => {
    const months = buildMonthly(r, params);
    months.forEach(m => series.push(Object.assign({ year: r.year }, m)));
  });
  return series;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'acc-section' + (sec.open ? ' open' : '');

    const headRow = document.createElement('div');
    headRow.className = 'acc-head-row';
    const head = document.createElement('button');
    head.type = 'button';
    head.className = 'acc-head';
    head.innerHTML = `<span class="idx">${sec.idx}</span>${sec.title}<span class="chev">▸</span>`;
    head.onclick = () => { secEl.classList.toggle('open'); };
    const secResetBtn = document.createElement('button');
    secResetBtn.type = 'button';
    secResetBtn.className = 'sec-reset-btn';
    secResetBtn.id = 'secreset_' + si;
    secResetBtn.textContent = '초기화';
    secResetBtn.style.display = 'none';
    secResetBtn.onclick = () => resetSection(sec);
    headRow.appendChild(head);
    headRow.appendChild(secResetBtn);

    const body = document.createElement('div');
    body.className = 'acc-body';

    sec.fields.forEach(f => {
      const field = document.createElement('div');
      const infoBtn = f.help ? `<button type="button" class="info-icon" id="h_${f.key}" aria-label="설명 보기">ⓘ</button>` : '';
      const resetBtn = `<button type="button" class="reset-icon" id="r_${f.key}" style="display:none" aria-label="기본값으로 되돌리기" title="기본값으로 되돌리기">↺</button>`;
      if (f.type === 'checkbox') {
        field.className = 'checkbox-row';
        field.innerHTML = `<input type="checkbox" id="f_${f.key}" ${state[f.key] ? 'checked' : ''}><span>${f.label}</span>${infoBtn}${resetBtn}`;
      } else if (f.type === 'range') {
        field.className = 'field';
        const noteHtml = f.note ? `<div class="field-note" id="n_${f.key}">${f.note(state)}</div>` : '';
        field.innerHTML = `<label>${f.label}${infoBtn}${resetBtn} <span class="val" id="v_${f.key}">${state[f.key]}${f.unit || ''}</span></label>
          ${noteHtml}
          <input type="range" id="f_${f.key}" min="${f.min}" max="${f.max}" step="${f.step}" value="${state[f.key]}">`;
      } else {
        field.className = 'field';
        field.innerHTML = `<label>${f.label}${infoBtn}${resetBtn}${f.unit ? ' <span class="val">(' + f.unit + ')</span>' : ''}</label>
          <input type="${f.type}" id="f_${f.key}" value="${state[f.key]}" ${f.min !== undefined ? 'min=' + f.min : ''} ${f.max !== undefined ? 'max=' + f.max : ''}>`;
      }
      body.appendChild(field);
    });

    secEl.appendChild(headRow);
    secEl.appendChild(body);
    sidebar.appendChild(secEl);
  });

  // 이벤트 바인딩
  SECTIONS.forEach(sec => sec.fields.forEach(f => {
    const el = document.getElementById('f_' + f.key);
    el.addEventListener('input', () => {
      let v;
      if (f.type === 'checkbox') v = el.checked;
      else if (f.type === 'range' || f.type === 'number') v = parseFloat(el.value);
      else v = el.value;
      state[f.key] = v;
      if (f.type === 'range') {
        document.getElementById('v_' + f.key).textContent = v + (f.unit || '');
      }
      updateFieldNotes();
      updateResetUI();
      recalc();
    });
    const resetBtn = document.getElementById('r_' + f.key);
    resetBtn.addEventListener('click', () => resetField(f));
  }));

  bindInfoIcons();
  updateFieldNotes();
  updateResetUI();
}

// 필드 하나를 기본값으로 되돌림
function resetField(f) {
  state[f.key] = DEFAULTS[f.key];
  const el = document.getElementById('f_' + f.key);
  if (f.type === 'checkbox') el.checked = state[f.key];
  else el.value = state[f.key];
  if (f.type === 'range') {
    document.getElementById('v_' + f.key).textContent = state[f.key] + (f.unit || '');
  }
  updateFieldNotes();
  updateResetUI();
  recalc();
}

// 섹션 내 모든 필드를 기본값으로 되돌림
function resetSection(sec) {
  sec.fields.forEach(f => resetField(f));
}

// 기본값과 다른 필드에만 되돌리기 아이콘을 표시하고, 변경된 필드가 있는 섹션에만 섹션 초기화 버튼을 표시
function updateResetUI() {
  SECTIONS.forEach((sec, si) => {
    let sectionChanged = false;
    sec.fields.forEach(f => {
      const changed = state[f.key] !== DEFAULTS[f.key];
      if (changed) sectionChanged = true;
      const btn = document.getElementById('r_' + f.key);
      if (btn) btn.style.display = changed ? 'inline-flex' : 'none';
    });
    const secBtn = document.getElementById('secreset_' + si);
    if (secBtn) secBtn.style.display = sectionChanged ? 'inline-block' : 'none';
  });
}

function updateFieldNotes() {
  SECTIONS.forEach(sec => sec.fields.forEach(f => {
    if (!f.note) return;
    const el = document.getElementById('n_' + f.key);
    if (el) el.textContent = f.note(state);
  }));
}

// 항목별 설명(help) 팝오버
// ------------------------------------------------------------
let activeInfoKey = null;
function bindInfoIcons() {
  SECTIONS.forEach(sec => sec.fields.forEach(f => {
    if (!f.help) return;
    const icon = document.getElementById('h_' + f.key);
    if (!icon) return;
    icon.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (activeInfoKey === f.key) { hideInfoPopover(); return; }
      showInfoPopover(icon, f.label, f.help);
      activeInfoKey = f.key;
    });
  }));
}

function showInfoPopover(anchor, title, text) {
  const pop = document.getElementById('infoPopover');
  pop.innerHTML = '';
  const t = document.createElement('div');
  t.className = 'info-popover-title';
  t.textContent = title.replace(/\s*—.*$/, '');
  const b = document.createElement('div');
  b.className = 'info-popover-body';
  b.textContent = text;
  pop.appendChild(t);
  pop.appendChild(b);
  pop.style.display = 'block';

  const rect = anchor.getBoundingClientRect();
  const popWidth = 300;
  let left = rect.left;
  if (left + popWidth > window.innerWidth - 12) left = window.innerWidth - popWidth - 12;
  pop.style.left = Math.max(12, left) + 'px';

  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow < 160) {
    pop.style.top = 'auto';
    pop.style.bottom = (window.innerHeight - rect.top + 6) + 'px';
  } else {
    pop.style.bottom = 'auto';
    pop.style.top = (rect.bottom + 6) + 'px';
  }
}

function hideInfoPopover() {
  const pop = document.getElementById('infoPopover');
  if (!pop) return;
  pop.style.display = 'none';
  activeInfoKey = null;
}

document.addEventListener('click', (e) => {
  const pop = document.getElementById('infoPopover');
  if (pop && pop.style.display === 'block' && !pop.contains(e.target) && !e.target.classList.contains('info-icon')) {
    hideInfoPopover();
  }
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideInfoPopover(); });

// 연도별 차트 (Canvas)
// ------------------------------------------------------------
function renderChart(results) {
  const canvas = document.getElementById('annualChart');
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.parentElement.clientWidth - 44;
  const cssH = 280;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, cssW, cssH);

  const series = buildFullMonthlySeries(results, state); // 월별 {year, month, income, expense, net, ...}
  const n = series.length;
  if (n === 0) return;

  const padL = 60, padR = 10, padT = 14, padB = 28;
  const plotW = cssW - padL - padR;
  const plotH = cssH - padT - padB;
  const xStep = plotW / n;

  const excessYears = new Set(results.filter(r => r.dcExcess > 1 || r.personalExcess > 1).map(r => r.year));

  const incomes = series.map(m => m.income);
  const expenses = series.map(m => m.expense);
  const nets = series.map(m => m.net);

  // 수입(바깥, 넓은 막대)과 지출(안쪽, 좁은 막대)을 같은 기준선(0)에서 겹쳐 그림.
  // 지출이 수입보다 크면 좁은 지출 막대가 넓은 수입 막대 위로 삐져나와 적자를 바로 보여줌.
  const barValues = [...incomes, ...expenses];
  const sortedBars = [...barValues].sort((a, b) => a - b);
  const p90Bar = sortedBars.length ? sortedBars[Math.floor(sortedBars.length * 0.9)] : 0;
  let maxTop = Math.min(Math.max(...barValues, 0), Math.max(p90Bar * 1.4, 10));
  maxTop = Math.max(maxTop, 10);

  // 순현금흐름이 적자인 달만을 위한 하단 여백(막대 스케일을 짓누르지 않도록 상한 적용)
  const deficits = nets.map(v => Math.max(0, -v));
  let maxBottom = Math.min(Math.max(...deficits, 0), maxTop * 1.5);

  const pxPerUnit = plotH / (maxTop + maxBottom);
  const zeroY = padT + maxTop * pxPerUnit;

  // 한도초과 과세 연도 배경 강조 (축·막대보다 먼저 그려 뒤에 깔리도록)
  // 막대 그래프 영역(padT~padT+plotH)보다 위아래로 더 크게 그려 바깥쪽까지 음영이 확장되도록 함
  series.forEach((m, i) => {
    if (!excessYears.has(m.year)) return;
    ctx.fillStyle = 'rgba(139,150,160,0.18)';
    ctx.fillRect(padL + xStep * i, 0, xStep, cssH);
  });

  ctx.strokeStyle = '#DCD5C4';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + plotH); ctx.lineTo(padL + plotW, padT + plotH);
  ctx.stroke();

  ctx.font = '10px monospace';
  [0.5, 1].forEach(frac => {
    const val = maxTop * frac;
    const y = zeroY - val * pxPerUnit;
    ctx.fillStyle = '#8B96A0';
    ctx.fillText(fmt(val), 4, y + 3);
    ctx.strokeStyle = '#EAE5D8';
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y); ctx.stroke();
  });
  ctx.strokeStyle = '#B9C2C9';
  ctx.beginPath(); ctx.moveTo(padL, zeroY); ctx.lineTo(padL + plotW, zeroY); ctx.stroke();
  ctx.fillStyle = '#5B6B77';
  ctx.fillText('0', 4, zeroY + 3);
  if (maxBottom > 0) {
    const y = zeroY + maxBottom * pxPerUnit;
    ctx.fillStyle = '#8B96A0';
    ctx.fillText('-' + fmt(maxBottom), 4, y + 3);
    ctx.strokeStyle = '#EAE5D8';
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + plotW, y); ctx.stroke();
  }

  const bwOuter = Math.max(1, xStep * 0.62);
  const bwInner = Math.max(0.6, xStep * 0.34);

  series.forEach((m, i) => {
    const cx = padL + xStep * i + xStep / 2;
    const incH = Math.min(Math.max(m.income, 0), maxTop) * pxPerUnit;
    const expH = Math.min(Math.max(m.expense, 0), maxTop) * pxPerUnit;
    ctx.fillStyle = '#2FA88A';
    ctx.fillRect(cx - bwOuter / 2, zeroY - incH, bwOuter, incH);
    ctx.fillStyle = '#D9853F';
    ctx.fillRect(cx - bwInner / 2, zeroY - expH, bwInner, expH);

    // 매년 1월마다 연도 라벨
    if (m.month === 1 || i === 0) {
      ctx.strokeStyle = '#EAE5D8';
      ctx.beginPath(); ctx.moveTo(cx - xStep / 2, padT); ctx.lineTo(cx - xStep / 2, padT + plotH); ctx.stroke();
      ctx.fillStyle = '#8B96A0';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(m.year, cx, padT + plotH + 16);
      ctx.textAlign = 'left';
    }
  });

  // 순현금흐름 라인 (월별) - 적자인 달은 0 기준선 아래(예약된 여백)로 자연스럽게 내려감
  ctx.strokeStyle = '#3D7AB8';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  series.forEach((m, i) => {
    const cx = padL + xStep * i + xStep / 2;
    const v = Math.max(-maxBottom, Math.min(maxTop, m.net));
    const y = zeroY - v * pxPerUnit;
    if (i === 0) ctx.moveTo(cx, y); else ctx.lineTo(cx, y);
  });
  ctx.stroke();

  // 호버 인터랙션을 위한 좌표 정보 저장
  chartGeom = { padL, padT, plotW, plotH, xStep, series, cssW, cssH };
  setupChartHover();
}

function breakdownStr(pairs) {
  return pairs.filter(([, v]) => v > 0.5).map(([label, v]) => `${label} ${fmt(v)}`).join(' · ');
}

let chartGeom = null;
let chartHoverBound = false;
function setupChartHover() {
  const canvas = document.getElementById('annualChart');
  const wrap = canvas.parentElement;
  const tooltip = document.getElementById('chartTooltip');
  const crosshair = document.getElementById('chartCrosshair');
  if (chartHoverBound) return;
  chartHoverBound = true;

  canvas.addEventListener('mousemove', (e) => {
    if (!chartGeom) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const { padL, plotW, xStep, series } = chartGeom;
    if (x < padL || x > padL + plotW) { hideHover(); return; }
    let idx = Math.floor((x - padL) / xStep);
    idx = Math.max(0, Math.min(series.length - 1, idx));
    const m = series[idx];
    const cx = padL + xStep * idx + xStep / 2;

    crosshair.style.left = cx + 'px';
    crosshair.classList.add('show');

    const incBreak = breakdownStr([
      ['DC퇴직연금', m.dc], ['개인연금', m.personal], ['국민연금', m.nps],
      ['근로소득', m.earned], ['실업급여', m.unemployment]
    ]);
    const expBreak = breakdownStr([
      ['퇴직소득세', m.taxRetire], ['종합/분리소득세', m.taxIncome],
      ['건강보험', m.nhis], ['재산세', m.propTax], ['종부세', m.jongbu]
    ]);

    const yr = currentResults.find(r => r.year === m.year);
    let alertLine = '';
    if (yr) {
      const parts = [];
      if (yr.dcExcess > 1) parts.push(`DC퇴직연금 ${fmt(yr.dcExcess)}만원 초과(한도 ${fmt(yr.dcLimit)}만원)`);
      if (yr.personalExcess > 1) parts.push(`개인연금 ${fmt(yr.personalExcess)}만원 초과(한도 ${fmt(yr.personalLimit)}만원)`);
      if (parts.length) {
        alertLine = `<div class="tt-alert">⚠ ${m.year}년 한도초과 과세 — ${parts.join(' / ')}<br>초과분은 감면 없는 세율(퇴직소득세 전체세율 또는 16.5% 기타소득세) 적용</div>`;
      }
    }

    tooltip.innerHTML = `<div class="tt-title">${m.year}년 ${m.month}월</div>` +
      `수입 ${fmt(m.income)}만원${incBreak ? `<br><span class="tt-sub">${incBreak}</span>` : ''}<br>` +
      `지출 ${fmt(m.expense)}만원${expBreak ? `<br><span class="tt-sub">${expBreak}</span>` : ''}<br>` +
      `<b>순현금흐름 ${fmt(m.net)}만원</b>` + alertLine;
    tooltip.style.left = cx + 'px';
    tooltip.style.top = '0px';
    tooltip.classList.add('show');
  });

  canvas.addEventListener('mouseleave', hideHover);

  function hideHover() {
    tooltip.classList.remove('show');
    crosshair.classList.remove('show');
  }
}

function renderMonthlyTable(results) {
  const sel = document.getElementById('yearSelect');
  sel.innerHTML = results.map(r => `<option value="${r.year}">${r.year} (만 ${r.age}세)</option>`).join('');
  if (!results.find(r => r.year === selectedYear)) selectedYear = results[0].year;
  sel.value = selectedYear;

  const yearResult = results.find(r => r.year === selectedYear);
  document.getElementById('monthlyTitle').textContent = `월별 현금흐름 · ${selectedYear}년 (만 ${yearResult.age}세)`;

  const months = buildMonthly(yearResult, state);
  const table = document.getElementById('monthlyTable');

  let badge = '';
  const badgeMap = { '직장': 'work', '임의계속': 'voluntary', '지역': 'region' };
  badge = `<span class="badge ${badgeMap[yearResult.nhisType]}">${yearResult.nhisType}가입자 (연중 최다월)</span>`;

  let html = `<thead><tr>
    <th>항목 ${badge}</th>
    ${months.map(m => `<th>${m.month}월</th>`).join('')}
    <th>합계</th>
  </tr></thead><tbody>`;

  const statusLabel = { work: '직장', voluntary: '임의계속', region: '지역' };
  const statusClass = { work: 'work', voluntary: 'voluntary', region: 'region' };
  html += `<tr><td>건보 가입유형</td>${months.map(m => `<td><span class="badge ${statusClass[m.nhisStatus]}" style="margin:0;">${statusLabel[m.nhisStatus]}</span></td>`).join('')}<td>-</td></tr>`;

  const rowsDef = [
    ['DC퇴직연금', 'dc'], ['개인연금', 'personal'],
    ['국민연금', 'nps'],
    ['근로소득', 'earned'], ['실업급여', 'unemployment']
  ];
  rowsDef.forEach(([label, key]) => {
    const vals = months.map(m => m[key]);
    if (vals.every(v => v === 0)) return;
    html += `<tr><td>${label}</td>${vals.map(v => `<td class="num">${v ? fmt(v) : '-'}</td>`).join('')}<td class="num">${fmt(vals.reduce((a, b) => a + b, 0))}</td></tr>`;
  });
  html += `<tr><td><b>수입 합계</b></td>${months.map(m => `<td class="num pos-strong">${fmt(m.income)}</td>`).join('')}<td class="num pos-strong">${fmt(months.reduce((a, m) => a + m.income, 0))}</td></tr>`;

  const expDef = [
    ['퇴직소득세+지방세', 'taxRetire'], ['종합/분리소득세+지방세', 'taxIncome'],
    ['건강보험+장기요양', 'nhis'], ['재산세', 'propTax'], ['종부세', 'jongbu']
  ];
  expDef.forEach(([label, key]) => {
    const vals = months.map(m => m[key]);
    if (vals.every(v => v === 0)) return;
    html += `<tr><td>${label}</td>${vals.map(v => `<td class="num neg">${v ? '-' + fmt(v) : '-'}</td>`).join('')}<td class="num neg">-${fmt(vals.reduce((a, b) => a + b, 0))}</td></tr>`;
  });
  html += `<tr><td><b>지출 합계</b></td>${months.map(m => `<td class="num neg">-${fmt(m.expense)}</td>`).join('')}<td class="num neg">-${fmt(months.reduce((a, m) => a + m.expense, 0))}</td></tr>`;

  html += `</tbody><tfoot><tr><td>순현금흐름</td>${months.map(m => `<td class="num">${fmt(m.net)}</td>`).join('')}<td class="num">${fmt(months.reduce((a, m) => a + m.net, 0))}</td></tr></tfoot>`;

  table.innerHTML = html;

  // 연금수령한도 안내 배너
  const limitBanner = document.getElementById('pensionLimitBanner');
  const dcOver = yearResult.dcExcess > 1;
  const persOver = yearResult.personalExcess > 1;
  if (dcOver || persOver) {
    limitBanner.style.display = 'flex';
    limitBanner.className = 'target-banner short';
    const parts = [];
    if (dcOver) parts.push(`DC퇴직연금 한도 ${fmt(yearResult.dcLimit)}만원 대비 ${fmt(yearResult.dcExcess)}만원 초과(${yearResult.dcPensionYear}년차)`);
    if (persOver) parts.push(`개인연금 한도 ${fmt(yearResult.personalLimit)}만원 대비 ${fmt(yearResult.personalExcess)}만원 초과(${yearResult.personalPensionYear}년차)`);
    limitBanner.innerHTML = `<b>⚠ 연금수령한도 초과</b>&nbsp;— ${parts.join(' / ')} → 초과분은 감면 없는 세율(퇴직소득세 전체세율 또는 16.5% 기타소득세) 적용 중`;
  } else if (yearResult.dcPensionYear > 0 || yearResult.personalPensionYear > 0) {
    limitBanner.style.display = 'flex';
    limitBanner.className = 'target-banner ok';
    const dcTxt = yearResult.dcPensionYear > 0 ? `DC 한도 ${yearResult.dcLimit === Infinity ? '무제한(11년차+)' : fmt(yearResult.dcLimit) + '만원'}` : '';
    const persTxt = yearResult.personalPensionYear > 0 ? `개인연금 한도 ${yearResult.personalLimit === Infinity ? '무제한(11년차+)' : fmt(yearResult.personalLimit) + '만원'}` : '';
    limitBanner.innerHTML = `<b>연금수령한도 이내</b>&nbsp;— ${[dcTxt, persTxt].filter(Boolean).join(' / ')}`;
  } else {
    limitBanner.style.display = 'none';
  }

  // 목표소득 대비 안내 배너
}

function renderFootnote() {
  document.getElementById('footnote').innerHTML = `
    본 도구는 한국 세법·건강보험료 산정방식을 근사화한 추정치를 제공하며, 실제 신고·부과액과 차이가 있을 수 있습니다.
    좌측의 모든 금액·나이·기간·주택가격은 사용자별로 자유롭게 입력해 자신의 시나리오에 맞게 사용할 수 있도록 설계되어 있습니다(예시값은 참고용 기본값일 뿐입니다).
    재산세·종합부동산세 계산은 <b>1세대1주택자</b> 특례(재산세 공정시장가액비율 45%, 종부세 공정시장가액비율 60%·기본공제 12억원)를 기준으로 하며, 다주택자에는 적용되지 않습니다.
    주택 다운사이징은 <b>재산세·종합부동산세·건강보험 재산분에만 반영</b>됩니다. 매도 시 발생하는 양도차익·양도소득세는 1회성 거액이라 월별 현금흐름 왜곡을 피하기 위해 의도적으로 제외했습니다(다운사이징 연도부터 낮아진 공시가격 기준으로 세금·건보료만 계속 반영).
    건강보험료 재산분(지역가입자)은 <b>공시가격 → 재산세 과세표준(45%) → 기본공제 1억원(2024.2월 개정) → 재산등급 점수표(60등급) → 점수당 금액(211.5원, 2026년 기준)</b> 순으로 자동 계산됩니다. 1~14등급은 시행령상 확인된 정확한 구간이며, 그 이상 고액 구간은 보건복지부 공식 예시로 보정한 근사 곡선을 사용해 소폭 오차가 있을 수 있습니다. 주택담보대출 등 부채공제는 반영하지 않았습니다.
    건강보험료 소득분(지역가입자)은 <b>공적연금(국민연금)소득만 대상</b>이며 사적연금(DC퇴직연금·개인연금)은 제외됩니다. 소득세 종합/분리과세 선택과 무관하게 항상 반영되고, 연 336만원을 공제한 뒤 50%만 소득으로 인정(2024.9월 개편)해 보험료율을 곱합니다.
    건강보험료율은 2026년 확정치 기준입니다: 직장가입자 7.19%(본인부담 3.595%), 지역가입자 소득분 7.19%, 장기요양보험료 건보료의 13.14%.
    세율·공제율·건보료율은 2024~2026년 기준 세법을 반영했으며, 향후 법 개정 시 달라질 수 있습니다.
    재산세는 7월/9월, 종부세는 12월에 발생하는 것으로 가정해 월별로 배분했습니다.
    DC퇴직연금·개인연금은 계좌 잔고에서 매월 인출하며, 잔고에는 입력한 연 운용수익률이 매월 복리로 적용됩니다. 잔고가 소진되면 그 이후 월수령액은 0으로 자동 반영됩니다.
    인출 시 세금 성격이 다른 재원은 비례배분이 아니라 <b>법정 순서(소득세법 시행령 제40조의3)</b>대로 소진됩니다: DC퇴직연금은 원금(이연퇴직소득)이 먼저, 운용수익이 나중에 인출되며, 개인연금은 세액공제 받지 않은 원금(비과세)이 먼저, 세액공제받은 원금+운용수익이 나중에 인출됩니다.
    DC퇴직연금 원금(이연퇴직소득) 부분의 이연퇴직소득세 감면율은 연금 실제 수령연차 10년 이하 30%, 10년 초과 40%이며, 별도 입력 없이 수령연차에 따라 자동으로 전환 적용됩니다.
    한도이내 사적연금소득(DC 운용수익+개인연금 과세대상분, 국민연금 제외)이 연 1,500만원 이하면 연령별 저율(55~69세 5.5%/70~79세 4.4%/80세이상 3.3%)로 분리과세되지만, 1,500만원을 단 1원이라도 초과하면 이 저율 혜택이 수령액 전체에서 사라지고 전액을 기준으로 16.5% 분리과세와 종합과세(6.6~49.5%) 중 유리한 쪽을 선택합니다.
    만 70세 이상에게 적용되는 <b>경로우대공제(연 100만원)</b>, 재취업 근로소득에 적용되는 <b>근로소득세액공제(총급여 구간별 연 20만~74만원)</b>와 <b>표준세액공제</b>는 월별 현금흐름에 미치는 영향이 작아 반영하지 않았습니다. 실제로는 이 금액만큼 세금이 더 낮아질 수 있습니다.
    <b>조기수령 중 재취업이 겹치는 달은 국민연금이 전액 지급정지</b>로 자동 반영됩니다(국민연금법 제63조). 다만 정상수령나이 도달 후 5년 이내 소득 있는 업무 종사 시의 부분 감액(제63조의2, 최대 50%)은 미반영입니다.
    각 입력 항목의 ⓘ 아이콘을 클릭하면 해당 항목의 상세 설명과 전제사항을 확인할 수 있습니다.
    정확한 세액·보험료는 세무사·국민건강보험공단·국민연금공단 상담을 통해 확인하시기 바랍니다.
    <div style="margin-top:10px;">© 2026 현수복. All rights reserved.</div>
  `;
}

function recalc() {
  currentResults = runSimulation(state);
  if (!currentResults || currentResults.length === 0) {
    document.getElementById('kpiRow').innerHTML = '';
    document.getElementById('timeline').innerHTML = '';
    document.getElementById('monthlyTable').innerHTML = '';
    document.getElementById('monthlyTitle').textContent = '월별 현금흐름';
    document.getElementById('footnote').innerHTML =
      '<b style="color:var(--negative);">⚠ 시뮬레이션 시작연도가 종료연도보다 늦어 계산할 수 없습니다. 기본정보의 연도 설정을 확인해주세요.</b>';
    return;
  }
  renderTimeline(currentResults);
  renderKPI(currentResults);
  renderChart(currentResults);
  renderMonthlyTable(currentResults);
  renderFootnote();
}

document.getElementById('prevYear').onclick = () => {
  const idx = currentResults.findIndex(r => r.year === selectedYear);
  if (idx > 0) { selectedYear = currentResults[idx - 1].year; renderMonthlyTable(currentResults); }
};
document.getElementById('nextYear').onclick = () => {
  const idx = currentResults.findIndex(r => r.year === selectedYear);
  if (idx < currentResults.length - 1) { selectedYear = currentResults[idx + 1].year; renderMonthlyTable(currentResults); }
};
document.getElementById('yearSelect').onchange = (e) => {
  selectedYear = parseInt(e.target.value);
  renderMonthlyTable(currentResults);
};
window.addEventListener('resize', () => renderChart(currentResults));

document.getElementById('btnSave').onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `retirement_sim_settings_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('btnLoad').onclick = () => document.getElementById('fileLoad').click();
document.getElementById('fileLoad').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const loaded = JSON.parse(ev.target.result);
      Object.assign(state, loaded);
      renderSidebar();
      recalc();
      alert('설정을 불러왔습니다.');
    } catch (err) {
      alert('파일을 읽는 중 오류가 발생했습니다. 올바른 설정 파일인지 확인해주세요.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

    '연도', '나이', 'DC퇴직연금', '개인연금', '국민연금', '근로소득', '실업급여',

    '재산세', '종부세', '총세금공과금', '총수입', '세후순수입',
    'DC잔고(연말)', '개인연금잔고(연말)'
  ];
  const annualRows = currentResults.map(r => [
    r.year, r.age, rnd(r.dcAnnual), rnd(r.personalAnnual), rnd(r.npsAnnual), rnd(r.earned), rnd(r.unemployment),
    rnd(r.taxRetire), rnd(r.taxIncome), rnd(r.excessOtherTax), rnd(r.nhisAnnual), r.nhisType,
    rnd(r.propTax), rnd(r.jongbu), rnd(r.totalTaxAll), rnd(r.grossIncome), rnd(r.netIncome),
    rnd(r.dcBalanceEnd), rnd(r.personalBalanceEnd)
  ]);
  const wsAnnual = XLSX.utils.aoa_to_sheet([annualCols, ...annualRows]);

  const monthlyCols = ['연도', '월', 'DC퇴직연금', '개인연금', '국민연금', '근로소득', '실업급여',
    '퇴직소득세', '종합소득세', '건강보험', '재산세', '종부세', '건보유형', '수입합계', '지출합계', '순현금흐름'];
  const series = buildFullMonthlySeries(currentResults, state);
  const monthlyRows = series.map(m => [
    m.year, m.month, rnd(m.dc), rnd(m.personal), rnd(m.nps), rnd(m.earned), rnd(m.unemployment),
    rnd(m.taxRetire), rnd(m.taxIncome), rnd(m.nhis), rnd(m.propTax), rnd(m.jongbu), m.nhisStatus,
    rnd(m.income), rnd(m.expense), rnd(m.net)
  ]);
  const wsMonthly = XLSX.utils.aoa_to_sheet([monthlyCols, ...monthlyRows]);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsAnnual, '연도별 요약');
  XLSX.utils.book_append_sheet(wb, wsMonthly, '월별 현금흐름');
  XLSX.writeFile(wb, `retirement_simulation_${new Date().toISOString().slice(0, 10)}.xlsx`);
};
